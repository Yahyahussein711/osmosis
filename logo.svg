<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:currentColor;stop-opacity:1" />
      <stop offset="100%" style="stop-color:currentColor;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- Main stylized O shape with flowing elements -->
  <!-- Left arc -->
  <path d="M 60 100 A 40 40 0 0 0 100 140 A 40 40 0 0 0 140 100"
        fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Right arc -->
  <path d="M 140 100 A 40 40 0 0 0 100 60 A 40 40 0 0 0 60 100"
        fill="none" stroke="url(#logoGradient)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Top flow indicators (knowledge flowing in) -->
  <line x1="100" y1="10" x2="100" y2="30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <circle cx="100" cy="15" r="2" fill="currentColor" opacity="0.8"/>

  <!-- Bottom flow indicators (knowledge flowing out) -->
  <line x1="100" y1="170" x2="100" y2="190" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <circle cx="100" cy="185" r="2" fill="currentColor" opacity="0.8"/>

  <!-- Left flow indicators -->
  <line x1="10" y1="100" x2="30" y2="100" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <circle cx="15" cy="100" r="2" fill="currentColor" opacity="0.7"/>

  <!-- Right flow indicators -->
  <line x1="170" y1="100" x2="190" y2="100" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <circle cx="185" cy="100" r="2" fill="currentColor" opacity="0.7"/>

  <!-- Center knowledge nucleus -->
  <circle cx="100" cy="100" r="6" fill="currentColor" opacity="0.9"/>
</svg>